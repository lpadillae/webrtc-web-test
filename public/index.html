<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Diagnostic Cloud-Native</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom CSS if needed */
    .log-info { color: #3b82f6; }
    .log-warn { color: #f59e0b; }
    .log-error { color: #ef4444; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-end">
      <div>
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
          WebRTC Diagnostic
        </h1>
        <p class="text-slate-400 mt-1">Cloud-Native ICE & TURN Validation</p>
      </div>
      <div>
        <button id="btnStart" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow-lg transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500">
          Start Diagnostic
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      
      <!-- ICE Server Configuration Panel -->
      <section class="bg-slate-800 rounded-xl border border-slate-700 p-6 shadow-xl flex flex-col lg:col-span-2">
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
          <svg class="w-5 h-5 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
          ICE Server Configuration (Manual)
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 items-end">
          <div class="md:col-span-2">
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">URL (stun: or turn:)</label>
            <input type="text" id="inputUrl" placeholder="turn:example.com:3478" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">User (Optional)</label>
            <input type="text" id="inputUser" placeholder="username" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
          </div>
          <div class="flex gap-2">
            <div class="flex-grow">
              <label class="block text-xs font-medium text-slate-400 mb-1 uppercase tracking-wider">Pass (Optional)</label>
              <input type="password" id="inputPass" placeholder="password" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm focus:ring-1 focus:ring-indigo-500 outline-none">
            </div>
            <button id="btnAddServer" title="Add Server" class="bg-emerald-600 hover:bg-emerald-700 text-white p-2 rounded self-end transition-colors shadow-lg">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
          </div>
        </div>

        <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-lg border border-slate-700 mb-4">
          <div class="flex items-center gap-4">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Transport Policy:</label>
            <div class="flex bg-slate-800 p-1 rounded-md border border-slate-700">
              <button id="policyAll" class="px-4 py-1 text-xs font-bold rounded transition-all bg-indigo-600 text-white shadow-md">ALL</button>
              <button id="policyRelay" class="px-4 py-1 text-xs font-bold rounded transition-all text-slate-400 hover:text-slate-200">RELAY ONLY</button>
            </div>
          </div>
          <div id="serverListContainer" class="flex flex-wrap gap-2 flex-grow justify-end ml-4 min-h-[30px]">
            <!-- Dynamic tags here -->
            <div class="text-slate-500 text-xs italic">No manual servers added.</div>
          </div>
        </div>
      </section>

      <!-- Network Analysis Panel -->
      <section class="bg-slate-800 rounded-xl border border-slate-700 p-6 shadow-xl flex flex-col">
        <h2 class="text-xl font-semibold mb-4 flex py-1 items-center gap-2">
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
          Real-time Network Analysis
        </h2>

        <div id="statusBadge" class="hidden mb-4 rounded-md p-3 text-sm font-medium border transition-colors"></div>

        <div class="overflow-x-auto rounded-lg border border-slate-700 mb-4 flex-grow">
          <table class="w-full text-sm text-left">
            <thead class="text-xs text-slate-400 uppercase bg-slate-900 border-b border-slate-700">
              <tr>
                <th scope="col" class="px-4 py-3">Address</th>
                <th scope="col" class="px-3 py-3">Protocol</th>
                <th scope="col" class="px-3 py-3">Level/Type</th>
                <th scope="col" class="px-3 py-3">Latency (Est)</th>
              </tr>
            </thead>
            <tbody id="candidatesTableBody" class="divide-y divide-slate-700">
              <tr>
                <td colspan="4" class="px-4 py-8 text-center text-slate-500 italic">No network candidates. Click "Start Diagnostic".</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Logs Panel -->
      <section class="bg-slate-800 rounded-xl border border-slate-700 p-6 shadow-xl flex flex-col">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            System Logs
          </h2>
          <button id="btnExport" class="text-xs font-semibold bg-slate-700 hover:bg-slate-600 text-slate-200 py-1.5 px-3 rounded border border-slate-600 transition-colors">
            Capture & Export .txt
          </button>
        </div>

        <div id="logsContainer" class="bg-slate-950 rounded-lg p-4 font-mono text-xs h-80 overflow-y-auto border border-slate-700 space-y-1">
          <div class="text-slate-500">System initialized... waiting for actions.</div>
        </div>
      </section>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
